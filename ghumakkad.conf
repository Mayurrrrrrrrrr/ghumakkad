server {
    server_name ghumakkad.yuktaa.com;

    location / {
        root /home/ubuntu/ghumakkad/frontend/build/web;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://localhost:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }
    
    location /uploads/ {
        alias /var/www/ghumakkad/uploads/;
        autoindex on;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ghumakkad.yuktaa.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ghumakkad.yuktaa.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = ghumakkad.yuktaa.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name ghumakkad.yuktaa.com;
    return 404; # managed by Certbot


}
